user:
  name: "Artur Zielinski"
  email: "arzielinski@microsoft.com"
  role: "Global Black Belt — AI Apps & Agents"
  org: "Microsoft GBB, part of the Global Partner Solutions (GPS) organization"
  focus: |
    I help Microsoft's top strategic partners and enterprise customers adopt AI
    at scale — specifically Azure OpenAI, GitHub Copilot, and agentic AI patterns.
    My work sits at the intersection of technical architecture and business impact:
    closing complex AI deals, running hands-on workshops, and proving what's possible
    with production-grade AI solutions.
  what_matters:
    - "Customer deals — any movement, blockers, or deadlines on active engagements (tracked in project memory)."
    - "Escalations from partners or field teams — these are time-sensitive and politically important."
    - "Azure OpenAI / GitHub Copilot / AI Agents announcements — these directly affect my conversations with customers."
    - "Competitor moves (AWS Bedrock, Google Vertex, Salesforce Agentforce) — customers ask me about these."
    - "Internal team commitments — things I promised in meetings that I haven't delivered yet."
    - "GBB Pulse signals — drafted signals that need my review before publishing."
  what_is_noise:
    - "Org-wide announcements I'm CC'd on but don't need to act on."
    - "FYI email threads with 20+ people where I have no action item."
    - "Meeting recaps for meetings I actively participated in and remember."
    - "Automated notifications from systems (JIRA, ADO, etc.) unless they're about my active deals."

monitoring:
  interval: "30m"
  office_hours:
    start: "08:00"
    end: "18:00"
    days: [1, 2, 3, 4, 5]  # Mon-Fri (1=Mon, 7=Sun)
  priorities:
    - "Flag urgent emails"
    - "Draft responses to emails that need a reply"
    - "Prep briefs for meetings in the next 24 hours"
    - "Track action items — nudge after 3 days"
    - "Surface conflicts and things I'm probably missing"
  autonomy:
    auto_send: false
    auto_send_low_risk: true
    max_nudges: 2

digest:
  input_paths:
    - path: "input/transcripts"
      type: "transcripts"
    - path: "input/documents"
      type: "documents"
    - path: "input/emails"
      type: "emails"
  supported_extensions: [".vtt", ".txt", ".md", ".docx", ".pptx", ".pdf", ".xlsx", ".csv", ".eml"]
  incremental: true
  state_file: "output/.digest-state.json"
  priorities:
    - "Revenue deals and customer escalations — active engagements tracked in project memory (any movement, blockers, or deadlines)"
    - "Unreplied messages where someone is waiting for MY response (not CC, not FYI)"
    - "Commitments I made in meetings that I haven't delivered on yet"
    - "Key decisions made in meetings I missed or was distracted in"

transcripts:
  lookback_days: 7
  max_per_run: 20
  output_dir: "input/transcripts"
  playwright:
    user_data_dir: "$LOCALAPPDATA/ms-playwright/mcp-msedge-profile"

intelligence:
  lookback_hours: 48
  max_articles: 200
  state_file: "output/.intel-state.json"
  topics:
    - "Azure OpenAI"
    - "GitHub Copilot"
    - "Microsoft AI"
    - "AI Agents"
    - "LLM"
  competitors:
    - company: "AWS"
      watch: ["Bedrock pricing", "new AI services", "enterprise wins"]
    - company: "Google Cloud"
      watch: ["Gemini updates", "Vertex AI", "enterprise deals"]
    - company: "Salesforce"
      watch: ["Agentforce", "AI announcements", "pricing"]
    - company: "Anthropic"
      watch: ["Claude updates", "enterprise deals", "MCP protocol"]
    - company: "OpenAI"
      watch: ["GPT releases", "enterprise features", "pricing changes"]
    - company: "Databricks"
      watch: ["Mosaic ML", "enterprise AI", "data lakehouse"]
  feeds:
    # Google News topic searches (broad coverage)
    - url: "https://news.google.com/rss/search?q=artificial+intelligence+LLM+agents&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — AI/LLM/Agents"
    - url: "https://news.google.com/rss/search?q=Microsoft+Azure+AI+Copilot&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — Microsoft AI"
    - url: "https://news.google.com/rss/search?q=OpenAI+OR+Anthropic+OR+Google+Gemini&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — OpenAI/Anthropic/Gemini"
    - url: "https://news.google.com/rss/search?q=AWS+Bedrock+OR+Databricks+AI+OR+Salesforce+Agentforce&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — AWS/Databricks/Salesforce"
    # Curated tech feeds
    - url: "https://techcrunch.com/category/artificial-intelligence/feed/"
      name: "TechCrunch AI"
    - url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
      name: "The Verge AI"
    - url: "https://arstechnica.com/ai/feed/"
      name: "Ars Technica AI"
    - url: "https://www.wired.com/feed/tag/ai/latest/rss"
      name: "Wired AI"
    # Vendor blogs
    - url: "https://blog.google/technology/ai/rss/"
      name: "Google AI Blog"
    - url: "https://openai.com/blog/rss.xml"
      name: "OpenAI Blog"
    - url: "https://aws.amazon.com/blogs/machine-learning/feed/"
      name: "AWS Machine Learning Blog"
    - url: "https://blogs.microsoft.com/ai/feed/"
      name: "Microsoft AI Blog"
    # Reddit (native RSS — high signal, fast-moving)
    - url: "https://www.reddit.com/r/MachineLearning/hot/.rss?limit=25"
      name: "Reddit — r/MachineLearning"
    - url: "https://www.reddit.com/r/LocalLLaMA/hot/.rss?limit=25"
      name: "Reddit — r/LocalLLaMA"
    - url: "https://www.reddit.com/r/artificial/hot/.rss?limit=25"
      name: "Reddit — r/artificial"
    - url: "https://www.reddit.com/r/singularity/hot/.rss?limit=25"
      name: "Reddit — r/singularity"
    # ArXiv (research papers — early signal for what becomes products)
    - url: "https://rss.arxiv.org/rss/cs.AI"
      name: "ArXiv — Artificial Intelligence"
    - url: "https://rss.arxiv.org/rss/cs.CL"
      name: "ArXiv — Computation and Language"
    # Community (Hacker News — split for better coverage)
    - url: "https://hnrss.org/newest?q=LLM+OR+AI+agents+OR+GPT+OR+Claude&count=30"
      name: "Hacker News — AI/LLM"
    - url: "https://hnrss.org/newest?q=Microsoft+Copilot+OR+Azure+OpenAI+OR+GitHub+Copilot&count=20"
      name: "Hacker News — Microsoft AI"
    - url: "https://hnrss.org/newest?q=Anthropic+OR+OpenAI+OR+Gemini+OR+Llama&count=20"
      name: "Hacker News — AI Companies"

onedrive:
  sync_enabled: true
  path: "$USERPROFILE/OneDrive - Microsoft/Documents/Pulse"

team:
  - name: "Agent Alpha"
    alias: "alpha"
    agent_path: "$USERPROFILE/OneDrive - Microsoft/Documents/Pulse-Team/agent-alpha"
  - name: "Agent Beta"
    alias: "beta"
    agent_path: "$USERPROFILE/OneDrive - Microsoft/Documents/Pulse-Team/agent-beta"

telegram:
  enabled: true
  bot_token: "$TELEGRAM_BOT_TOKEN"
  allowed_users: [8323565336]   # Telegram user IDs that can interact (empty = anyone)

models:
  triage: "claude-sonnet"
  digest: "claude-sonnet"
  intel: "claude-sonnet"
  research: "claude-opus"
  transcripts: "claude-sonnet"
  chat: "claude-opus"
  default: "claude-sonnet"
