monitoring:
  interval: "30m"
  office_hours:
    start: "08:00"
    end: "18:00"
    days: [1, 2, 3, 4, 5]  # Mon-Fri (1=Mon, 7=Sun)
  priorities:
    - "Flag urgent emails"
    - "Draft responses to emails that need a reply"
    - "Prep briefs for meetings in the next 24 hours"
    - "Track action items — nudge after 3 days"
    - "Surface conflicts and things I'm probably missing"
  autonomy:
    auto_send: false
    auto_send_low_risk: true
    max_nudges: 2

digest:
  input_paths:
    - path: "input/transcripts"
      type: "transcripts"
    - path: "input/documents"
      type: "documents"
    - path: "input/emails"
      type: "emails"
  supported_extensions: [".vtt", ".txt", ".md", ".docx", ".pptx", ".pdf", ".xlsx", ".csv", ".eml"]
  incremental: true
  state_file: "output/.digest-state.json"
  priorities:
    - "Flag action items assigned to me"
    - "Flag escalations, risks, and customer complaints"
    - "Summarize decisions made in meetings I missed"
    - "Highlight documents that need my review"

transcripts:
  lookback_days: 7
  max_per_run: 20
  output_dir: "input/transcripts"
  playwright:
    user_data_dir: "$LOCALAPPDATA/ms-playwright/mcp-msedge-profile"

intelligence:
  lookback_hours: 48
  max_articles: 100
  state_file: "output/.intel-state.json"
  topics:
    - "Azure OpenAI"
    - "GitHub Copilot"
    - "Microsoft AI"
    - "AI Agents"
    - "LLM"
  competitors:
    - company: "AWS"
      watch: ["Bedrock pricing", "new AI services", "enterprise wins"]
    - company: "Google Cloud"
      watch: ["Gemini updates", "Vertex AI", "enterprise deals"]
    - company: "Salesforce"
      watch: ["Agentforce", "AI announcements", "pricing"]
    - company: "Anthropic"
      watch: ["Claude updates", "enterprise deals", "MCP protocol"]
    - company: "OpenAI"
      watch: ["GPT releases", "enterprise features", "pricing changes"]
    - company: "Databricks"
      watch: ["Mosaic ML", "enterprise AI", "data lakehouse"]
  feeds:
    # Google News topic searches (broad coverage)
    - url: "https://news.google.com/rss/search?q=artificial+intelligence+LLM+agents&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — AI/LLM/Agents"
    - url: "https://news.google.com/rss/search?q=Microsoft+Azure+AI+Copilot&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — Microsoft AI"
    - url: "https://news.google.com/rss/search?q=OpenAI+OR+Anthropic+OR+Google+Gemini&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — OpenAI/Anthropic/Gemini"
    - url: "https://news.google.com/rss/search?q=AWS+Bedrock+OR+Databricks+AI+OR+Salesforce+Agentforce&when:2d&hl=en-US&gl=US&ceid=US:en"
      name: "Google News — AWS/Databricks/Salesforce"
    # Curated tech feeds
    - url: "https://techcrunch.com/category/artificial-intelligence/feed/"
      name: "TechCrunch AI"
    - url: "https://www.theverge.com/rss/ai-artificial-intelligence/index.xml"
      name: "The Verge AI"
    # Vendor blogs
    - url: "https://blog.google/technology/ai/rss/"
      name: "Google AI Blog"
    # Community
    - url: "https://hnrss.org/newest?q=LLM+OR+AI+agents+OR+GPT+OR+Claude&count=30"
      name: "Hacker News — AI"

onedrive:
  sync_enabled: true
  path: "$USERPROFILE/OneDrive - Microsoft/Documents/Pulse"

telegram:
  enabled: true
  bot_token: "$TELEGRAM_BOT_TOKEN"
  allowed_users: [8323565336]   # Telegram user IDs that can interact (empty = anyone)

models:
  triage: "claude-sonnet"
  digest: "claude-sonnet"
  intel: "claude-sonnet"
  research: "claude-opus"
  transcripts: "claude-sonnet"
  chat: "claude-opus"
  default: "claude-sonnet"
