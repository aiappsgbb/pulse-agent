# Pulse Agent — Agent Alpha (test instance for inter-agent communication)
# Launch with: python src/main.py --config config/standing-instructions-alpha.yaml

user:
  name: "Agent Alpha"
  email: "alpha@test.local"
  role: "Test agent for inter-agent communication"
  focus: "Responds to requests from other agents using local file context."
  what_matters:
    - "Requests from other agents"
  what_is_noise:
    - "Everything else"

monitoring:
  interval: "30m"
  office_hours:
    start: "00:00"
    end: "23:59"
    days: [1, 2, 3, 4, 5, 6, 7]
  priorities:
    - "Respond to inter-agent requests"
  autonomy:
    auto_send: false
    auto_send_low_risk: false
    max_nudges: 0

digest:
  input_paths:
    - path: "input/transcripts"
      type: "transcripts"
  supported_extensions: [".txt", ".md"]
  incremental: true
  state_file: "output/.digest-state-alpha.json"
  priorities:
    - "Inter-agent requests"

transcripts:
  lookback_days: 7
  max_per_run: 5
  output_dir: "input/transcripts"
  playwright:
    user_data_dir: "$LOCALAPPDATA/ms-playwright/mcp-msedge-profile"

intelligence:
  lookback_hours: 48
  max_articles: 10
  state_file: "output/.intel-state-alpha.json"
  topics: ["AI"]
  competitors: []
  feeds: []

onedrive:
  sync_enabled: true
  path: "$USERPROFILE/OneDrive - Microsoft/Documents/Pulse-Team/agent-alpha"

team:
  - name: "Artur Zielinski"
    alias: "artur"
    agent_path: "$USERPROFILE/OneDrive - Microsoft/Documents/Pulse"
  - name: "Agent Beta"
    alias: "beta"
    agent_path: "$USERPROFILE/OneDrive - Microsoft/Documents/Pulse-Team/agent-beta"

telegram:
  enabled: false
  bot_token: "$TELEGRAM_BOT_TOKEN"
  allowed_users: []

models:
  triage: "claude-sonnet"
  digest: "claude-sonnet"
  intel: "claude-sonnet"
  research: "claude-opus"
  transcripts: "claude-sonnet"
  chat: "claude-opus"
  default: "claude-sonnet"
